name: AI Agent Docker Image

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - ai/**
      - models/**
      - .github/workflows/ai-agent-image.yml
  push:
    branches:
      - develop
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - ai/**
      - models/**
      - .github/workflows/ai-agent-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish AI agent image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chost-hunter-agent"
          SHORT_SHA="${GITHUB_SHA::7}"

          {
            echo "IMAGE_NAME=$IMAGE"
            echo "IMAGE_TAGS<<EOF"
            echo "$IMAGE:$SHORT_SHA"
            if [[ "$GITHUB_REF_NAME" == "develop" ]]; then
              echo "$IMAGE:develop"
            fi
            if [[ "$GITHUB_REF_NAME" == "main" ]]; then
              echo "$IMAGE:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
